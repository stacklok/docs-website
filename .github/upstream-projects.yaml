# Human-maintained source-of-truth for upstream projects whose releases
# trigger doc-update PRs.
#
# Two automation paths read this file:
#
#   - stacklok/toolhive releases: .github/workflows/update-toolhive-reference.yml
#     is triggered by repository_dispatch (from the ToolHive release CI) or
#     workflow_dispatch. It regenerates reference assets, bumps this YAML,
#     applies pin_files, and opens a single PR. Renovate is explicitly
#     disabled for this dep (see renovate.json) to avoid racing.
#
#   - All other projects (registry-server, studio, cloud-ui):
#     Renovate watches `repo:` + `version:` pairs here as a custom-regex
#     manager and opens version-bump PRs automatically.
#     .github/workflows/upstream-release-docs.yml reacts to those PRs and
#     adds source-verified content edits via the upstream-release-docs
#     skill.
#
# Either way, Renovate or the reference workflow bumps `version:`. You can
# also edit it by hand (e.g., to backfill or reset) and dispatch the
# upstream-release-docs workflow manually.

projects:
  - id: toolhive-registry-server
    repo: stacklok/toolhive-registry-server
    version: v1.2.1
    docs_paths:
      - docs/toolhive/guides-registry
      - docs/toolhive/concepts/registry-criteria.mdx
    # Files copied from the upstream repo at the pinned tag whenever
    # version: bumps. Source paths are relative to the upstream repo
    # root; destination paths are relative to this repo root. Keeping
    # the swagger locally (rather than referencing via jsdelivr) lets
    # the docs build offline and keeps the pin implicit in git.
    assets:
      - source: docs/thv-registry-api/swagger.yaml
        destination: static/api-specs/toolhive-registry-api.yaml

  - id: toolhive
    repo: stacklok/toolhive
    version: v0.22.0
    docs_paths:
      - docs/toolhive/guides-cli
      - docs/toolhive/guides-k8s
      - docs/toolhive/guides-vmcp

  - id: toolhive-studio
    repo: stacklok/toolhive-studio
    version: v0.30.0
    docs_paths:
      - docs/toolhive/guides-ui

  - id: toolhive-cloud-ui
    repo: stacklok/toolhive-cloud-ui
    version: v0.5.1
    docs_paths: []
