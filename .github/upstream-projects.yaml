# Human-maintained source-of-truth for upstream projects whose releases
# trigger doc-update PRs via .github/workflows/upstream-release-docs.yml.
#
# Bump `version:` to the last-documented tag. The workflow advances it
# automatically when a release lands and docs are updated, but you may
# also edit it by hand (e.g., to backfill or reset).
#
# The bot-maintained scan timestamps live separately in
# .github/upstream-scan-state.json so diffs to this file stay meaningful.

projects:
  - id: toolhive-registry-server
    repo: stacklok/toolhive-registry-server
    version: v1.2.1
    docs_paths:
      - docs/toolhive/guides-registry
      - docs/toolhive/concepts/registry-criteria.mdx
    pin_files:
      - path: docusaurus.config.ts
        replace_latest: true

  - id: toolhive
    repo: stacklok/toolhive
    version: v0.22.0
    docs_paths:
      - docs/toolhive/guides-cli
      - docs/toolhive/guides-k8s
      - docs/toolhive/guides-vmcp

  - id: toolhive-studio
    repo: stacklok/toolhive-studio
    version: v0.30.0
    docs_paths:
      - docs/toolhive/guides-ui

  - id: toolhive-cloud-ui
    repo: stacklok/toolhive-cloud-ui
    version: v0.5.1
    docs_paths: []
