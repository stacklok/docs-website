name: Update ToolHive Reference Docs

# Handles stacklok/toolhive releases end-to-end. Regenerates the
# machine-generated reference assets (CLI help, Swagger, CRD schemas),
# bumps the toolhive entry in .github/upstream-projects.yaml, applies
# pin_files substitutions, and opens a PR carrying the
# `upstream-content` label. The label triggers
# upstream-release-docs.yml to add skill-generated content edits to
# the same PR, producing one unified PR per toolhive release.
#
# The other three tracked projects (registry-server, studio,
# cloud-ui) don't produce reference artifacts this docs site consumes;
# they're handled by Renovate + upstream-release-docs.yml alone.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'ToolHive version to update reference docs for'
        required: true
        default: 'latest'
      assign_to:
        description: 'GitHub username to request PR review from (optional)'
        required: false
  repository_dispatch:
    types: [published-release]

permissions:
  contents: write
  pull-requests: write

concurrency:
  # Share the group with upstream-release-docs.yml so a toolhive
  # release doesn't have the reference and content workflows racing
  # against the same branch.
  group: upstream-release-docs
  cancel-in-progress: false

jobs:
  update-reference:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version
        id: get-version
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Determine reviewer
        id: get-reviewer
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            REVIEWER="${{ github.event.client_payload.assign_to }}"
          else
            REVIEWER="${{ github.event.inputs.assign_to }}"
          fi
          # Filter out github-actions bot and stacklokbot (can't be requested as reviewers)
          if [[ "$REVIEWER" =~ ^github-actions ]] || [[ "$REVIEWER" == "stacklokbot" ]]; then
            REVIEWER=""
          fi
          echo "assign_to=$REVIEWER" >> $GITHUB_OUTPUT

      - name: Run update script
        id: imports
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.get-version.outputs.version }}
        run: |
          chmod +x scripts/update-toolhive-reference.sh
          if ! scripts/update-toolhive-reference.sh "$VERSION"; then
            echo "::error::Failed to update ToolHive reference docs"
            exit 1
          fi

      - name: Resolve tag for YAML bump
        id: resolve
        env:
          INPUT_VERSION: ${{ steps.imports.outputs.version }}
          FALLBACK_VERSION: ${{ steps.get-version.outputs.version }}
        run: |
          # scripts/update-toolhive-reference.sh emits `version` to
          # GITHUB_OUTPUT after resolving `latest` to a concrete tag.
          # Fall back to the raw input if something unexpected happened.
          TAG="${INPUT_VERSION:-$FALLBACK_VERSION}"
          if [ -z "$TAG" ] || [ "$TAG" = "latest" ]; then
            echo "::error::Could not resolve a concrete tag for the YAML bump (got '$TAG')."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Bump YAML + apply pin_files for toolhive
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          # No-ops cleanly if already at this tag (rerun safety).
          if ! node scripts/upstream-release/bump-yaml.mjs \
              --id toolhive --tag "$TAG" 2>/tmp/bump.err; then
            if grep -q 'already pinned' /tmp/bump.err; then
              echo "YAML already at $TAG; continuing."
            else
              cat /tmp/bump.err >&2
              exit 1
            fi
          fi
          node scripts/upstream-release/apply-pin-files.mjs \
            --id toolhive --tag "$TAG"

      - name: Check for changes
        id: git-diff
        run: |
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Detect newly added CRDs
        id: new-crds
        if: steps.git-diff.outputs.changed == 'true'
        run: |
          # A new upstream CRD results in an added *.schema.json under
          # static/api-specs/crds/. New CRDs publish automatically with
          # schema-derived prose; flag them so reviewers can decide whether
          # to add a hand-written override in scripts/lib/crd-intros.mjs.
          NEW=()
          while IFS= read -r schema_file; do
            [ -z "$schema_file" ] && continue
            kind=$(jq -r '."x-kubernetes-kind"' "$schema_file")
            NEW+=("$kind")
          done < <(git diff --cached --name-only --diff-filter=A -- 'static/api-specs/crds/*.schema.json')

          if [ ${#NEW[@]} -gt 0 ]; then
            {
              echo "note_block<<EOF"
              echo ""
              echo "> [!NOTE]"
              echo "> **New CRD(s) in this release.** The following Kind(s) were"
              echo "> added upstream and have been auto-published with"
              echo "> schema-derived prose:"
              echo ">"
              for kind in "${NEW[@]}"; do
                echo "> - \`$kind\`"
              done
              echo ">"
              echo "> This does not block the release. To polish the page(s),"
              echo "> add an override entry in \`scripts/lib/crd-intros.mjs\`"
              echo "> (all fields optional) and push to this branch, or land a"
              echo "> follow-up PR after merge."
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "note_block=" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.git-diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          branch: docs/upstream-toolhive-${{ steps.imports.outputs.version }}
          title: |
            Update toolhive docs for ${{ steps.imports.outputs.version }}
          body: |
            This PR was auto-generated from ToolHive release **${{ steps.imports.outputs.version }}**.${{ steps.get-reviewer.outputs.assign_to != '' && format(' @{0} is tagged as the person who cut this release.', steps.get-reviewer.outputs.assign_to) || '' }}
            ${{ steps.new-crds.outputs.note_block }}

            ## What's in this PR

            **Machine-generated reference files** (built from the ToolHive source at tag `${{ steps.imports.outputs.version }}`):

            - **CLI reference** (`docs/toolhive/reference/cli/`) - help text for every `thv` command
            - **REST API spec** (`static/api-specs/toolhive-api.yaml`) - OpenAPI/Swagger spec
            - **CRD reference** (`docs/toolhive/reference/crds/`, `static/api-specs/crds/`) - per-CRD MDX pages, extracted JSON schemas, and YAML examples
            - **Registry JSON schemas** (`static/api-specs/*.schema.json`) - registry validation schemas

            **Version tracking**:

            - `.github/upstream-projects.yaml` - toolhive pin bumped to `${{ steps.imports.outputs.version }}`
            - `pin_files` substitutions applied (e.g., `docusaurus.config.ts`)

            ## What will be added next

            The `upstream-release-docs.yml` workflow runs automatically when this PR opens and adds source-verified content edits to the guide/concept pages that describe this release. Wait for the content augmentation to complete before reviewing - look for a second commit from `github-actions[bot]` and a "Content additions by upstream-release-docs" section in the PR body.

            ## Review guidance

            Reference files are not hand-edited - a quick scan suffices. Content edits should be reviewed for accuracy against the release notes and source at the tag.
          commit-message: |
            Update toolhive docs for ${{ steps.imports.outputs.version }}
          labels: |
            autogen-docs
            upstream-content
          reviewers: ${{ steps.get-reviewer.outputs.assign_to }}
          delete-branch: true
          sign-commits: true
