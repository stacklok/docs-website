name: Update ToolHive Reference Docs

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'ToolHive version to update reference docs for'
        required: true
        default: 'latest'
      assign_to:
        description: 'GitHub username to request PR review from (optional)'
        required: false
  repository_dispatch:
    types: [published-release]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-toolhive-reference
  cancel-in-progress: false

jobs:
  update-reference:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version
        id: get-version
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Determine reviewer
        id: get-reviewer
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            REVIEWER="${{ github.event.client_payload.assign_to }}"
          else
            REVIEWER="${{ github.event.inputs.assign_to }}"
          fi
          # Filter out github-actions bot and stacklokbot (can't be requested as reviewers)
          if [[ "$REVIEWER" =~ ^github-actions ]] || [[ "$REVIEWER" == "stacklokbot" ]]; then
            REVIEWER=""
          fi
          echo "assign_to=$REVIEWER" >> $GITHUB_OUTPUT

      - name: Run update script
        id: imports
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/update-toolhive-reference.sh
          if ! scripts/update-toolhive-reference.sh ${{ steps.get-version.outputs.version }}; then
            echo "::error::Failed to update ToolHive reference docs"
            exit 1
          fi

      - name: Check for changes
        id: git-diff
        run: |
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Detect newly added CRDs
        id: new-crds
        if: steps.git-diff.outputs.changed == 'true'
        run: |
          # A new upstream CRD results in an added *.schema.json under
          # static/api-specs/crds/. New CRDs publish automatically with
          # schema-derived prose; flag them so reviewers can decide whether
          # to add a hand-written override in scripts/lib/crd-intros.mjs.
          NEW=()
          while IFS= read -r schema_file; do
            [ -z "$schema_file" ] && continue
            kind=$(jq -r '."x-kubernetes-kind"' "$schema_file")
            NEW+=("$kind")
          done < <(git diff --cached --name-only --diff-filter=A -- 'static/api-specs/crds/*.schema.json')

          if [ ${#NEW[@]} -gt 0 ]; then
            {
              echo "note_block<<EOF"
              echo ""
              echo "> [!NOTE]"
              echo "> **New CRD(s) in this release.** The following Kind(s) were"
              echo "> added upstream and have been auto-published with"
              echo "> schema-derived prose:"
              echo ">"
              for kind in "${NEW[@]}"; do
                echo "> - \`$kind\`"
              done
              echo ">"
              echo "> This does not block the release. To polish the page(s),"
              echo "> add an override entry in \`scripts/lib/crd-intros.mjs\`"
              echo "> (all fields optional) and push to this branch, or land a"
              echo "> follow-up PR after merge."
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "note_block=" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.git-diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          branch: update-toolhive-reference-${{ steps.imports.outputs.version }}
          title: |
            Update ToolHive reference docs for ${{ steps.imports.outputs.version }}
          body: |
            This PR was auto-generated from ToolHive release **${{ steps.imports.outputs.version }}**.${{ steps.get-reviewer.outputs.assign_to != '' && format(' @{0} is tagged as the person who cut this release.', steps.get-reviewer.outputs.assign_to) || '' }}
            ${{ steps.new-crds.outputs.note_block }}

            ## What's in this PR

            Only machine-generated reference files that are built from the ToolHive source code during the release process:

            - **CLI reference** (`docs/toolhive/reference/cli/`) - help text for every `thv` command
            - **REST API spec** (`static/api-specs/toolhive-api.yaml`) - OpenAPI/Swagger spec
            - **CRD reference** (`docs/toolhive/reference/crds/`, `static/api-specs/crds/`) - per-CRD MDX pages, extracted JSON schemas, and YAML examples
            - **Registry JSON schemas** (`static/api-specs/*.schema.json`) - registry validation schemas

            ## What's NOT in this PR

            This PR does **not** contain guide, tutorial, or conceptual content. Any documentation updates beyond reference files are handled in separate, manually authored PRs.

            ## Review guidance

            These files are generated directly from the ToolHive source and are not hand-edited. A quick scan for obvious issues is sufficient - this is intended to be merged shortly after the release is cut so the docs stay in sync.
          commit-message: |
            Update ToolHive reference docs for ${{ steps.imports.outputs.version }}
          labels: |
            autogen-docs
          reviewers: ${{ steps.get-reviewer.outputs.assign_to }}
          delete-branch: true
          sign-commits: true
